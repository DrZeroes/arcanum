<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcanumRP - Création</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <h1>ArcanumRP : Création de personnages</h1>

        <div class="row">
            <div class="col">
                <input type="text" id="charName" placeholder="NOM DU PERSONNAGE" oninput="updateUI()">
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>RACE</label>
                <select id="raceSelect"></select>
            </div>
            <div class="col">
                <label>SEXE</label>
                <select id="sexeSelect">
                    <option value="M">Masculin</option>
                    <option value="F">Féminin</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>ANTÉCÉDENT</label>
                <select id="bgSelect"></select>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-box"><div class="stat-label">FORCE</div><div id="val-FO" class="stat-value">8</div></div>
            <div class="stat-box"><div class="stat-label">INTELLIGENCE</div><div id="val-IN" class="stat-value">8</div></div>
            <div class="stat-box"><div class="stat-label">CONSTITUTION</div><div id="val-CN" class="stat-value">8</div></div>
            <div class="stat-box"><div class="stat-label">DEXTÉRITÉ</div><div id="val-DX" class="stat-value">8</div></div>
            <div class="stat-box"><div class="stat-label">CHARISME</div><div id="val-CH" class="stat-value">8</div></div>
        </div>
        
        <div id="raceTraits" class="special-trait"></div>

        <div class="derived-stats">
            <div class="derived-item" style="color: #4caf50;">Points de Vie : <span id="pv-total">0</span></div>
            <div class="derived-item" style="color: #2196f3;">Fatigue / Magie : <span id="fatigue-total">0</span></div>
        </div>

        <div id="desc-box" class="description-box"></div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="next-btn">Étape suivante : Compétences & Points</button>
        </div>

        <div class="aide-section">
            <small>FO: Dégâts/PV | IN: Magie/Dialogue | CN: Poison/Fatigue | DX: Vitesse/Esquive | CH: Social</small>
        </div>
    </div>

    <script src="backgrounds.js"></script>
    <script src="script.js"></script>
</body>
</html>
